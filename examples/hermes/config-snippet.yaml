# Run `bun run setup:agents -- --agent hermes` to merge this provider safely.
# Manual equivalent for ~/.hermes/config.yaml:

custom_providers:
  - name: freeai
    base_url: http://127.0.0.1:3263/api
    api_key: dummy-key
    models:
      qwen3-coder-plus:
        context_length: 131072
      deepseek-default:
        context_length: 131072
      deepseek-reasoner:
        context_length: 131072

# Запуск:
# hermes chat --provider custom:freeai --model qwen3-coder-plus
#
# Проверка tools/skills:
# hermes chat --provider custom:freeai --model qwen3-coder-plus \
#   -q 'Как настроить Hermes Agent gateway для Telegram? Сначала используй нужный skill.'
#
# Ожидаемо: Hermes должен показать вызов skill_view, затем ответить по результату skill.
