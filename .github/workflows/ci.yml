name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bun:
    name: Bun checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests and build validation
        run: bun run ci

      - name: Validate cross-platform launcher
        run: bun run start:full -- --check-only --skip-checks

      - name: Validate cross-platform agent installer
        run: bun run setup:agents -- --dry-run --home .agent-setup-check

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose
        run: docker compose config -q

      - name: Build Qwen image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: freeqwenapi:ci
          cache-from: type=gha,scope=qwen
          cache-to: type=gha,mode=max,scope=qwen

      - name: Build lightweight gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.light
          push: false
          tags: freeqwenapi-light:ci
          cache-from: type=gha,scope=light
          cache-to: type=gha,mode=max,scope=light
